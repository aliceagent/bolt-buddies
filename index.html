<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b14" />
    <meta name="description" content="Bolt Buddies — a 2-player couch co-op puzzle platformer. Two little lab robots rescue their robo-puppy from a dramatic security AI." />
    <!-- Open Graph (Facebook, Slack, Discord, iMessage, LinkedIn) -->
    <meta property="og:site_name" content="Bolt Buddies" />
    <meta property="og:title" content="Bolt Buddies — a 2-player rescue mission" />
    <meta property="og:description" content="K.O.B.I. grabbed your robo-puppy Bolt. Grab a buddy and chase him through the lab — neither of you can do it alone. Free 2-player couch co-op in your browser." />

    <meta property="og:url" content="https://bolt-buddies.vercel.app/" />
    <meta property="og:image" content="https://bolt-buddies.vercel.app/og-card.png" />
    <meta property="og:image:secure_url" content="https://bolt-buddies.vercel.app/og-card.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BOLT BUDDIES — the robots Beep and Boop with their robo-puppy Bolt, watched by the security AI K.O.B.I." />
    <!-- Twitter / X large summary card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bolt Buddies — a 2-player rescue mission" />
    <meta name="twitter:description" content="K.O.B.I. grabbed your robo-puppy Bolt. Grab a buddy and rescue him — neither of you can do it alone. Free 2-player couch co-op in your browser." />
    <meta name="twitter:image" content="https://bolt-buddies.vercel.app/og-card.png" />
    <meta name="twitter:image:alt" content="BOLT BUDDIES — Beep, Boop and their robo-puppy Bolt in the neon lab." />
    <title>Bolt Buddies</title>
    <style>
      /* GFX4 F1: display font (headings/buttons). Variable weight 600-700,
         latin subset, served same-origin — no runtime CDN fetch. Body/terminal
         text keeps mono (the deliberate "KOBI terminal" voice). font-display
         swap so a slow font never blocks first paint; main.js also races the
         load against a ~1500ms timeout before booting Phaser. */
      @font-face {
        font-family: "Fredoka";
        src: url(/fonts/fredoka-latin.woff2) format("woff2");
        font-weight: 600 700;
        font-display: swap;
      }
      html, body { height: 100%; margin: 0; padding: 0; }
      body {
        background: #070b14;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #game { width: 100%; height: 100%; }
      #game canvas { image-rendering: auto; }

      /* GFX4 F2 (2a): CSS-only loading splash. Covers the dark pre-boot frame
         (the page is otherwise blank-dark until Phaser paints the Title) and
         doubles as the Fredoka warm-up (the wordmark forces the @font-face to
         load). No JS animation, no images, no external anything — main.js fades
         it out + removes it the moment the Title scene renders. */
      #bb-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #070b14;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        opacity: 1;
        transition: opacity 250ms ease;
      }
      #bb-splash.bb-hide { opacity: 0; }
      /* KOBI's single eye — pure CSS: nested radial-gradient rings (hot white
         core -> cyan iris -> dark socket) with a pulsing scale + neon glow. */
      .bb-splash-eye {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 50%, #f0feff 0%, #eafdff 11%, rgba(234,253,255,0) 15%),
          radial-gradient(circle at 50% 50%, #6ff6ff 0%, #35f0ff 26%, #0e5f78 44%, rgba(14,95,120,0) 60%),
          radial-gradient(circle at 50% 50%, #0b2233 0%, #0b2233 60%, rgba(11,34,51,0) 74%);
        box-shadow: 0 0 22px 3px rgba(53, 240, 255, 0.4),
          inset 0 0 14px rgba(0, 0, 0, 0.6);
        animation: bb-eye-pulse 1.6s ease-in-out infinite;
      }
      @keyframes bb-eye-pulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 0 20px 3px rgba(53, 240, 255, 0.32),
            inset 0 0 14px rgba(0, 0, 0, 0.6);
        }
        50% {
          transform: scale(1.08);
          box-shadow: 0 0 36px 9px rgba(53, 240, 255, 0.6),
            inset 0 0 14px rgba(0, 0, 0, 0.6);
        }
      }
      .bb-splash-wordmark {
        font-family: "Fredoka", "Trebuchet MS", "Segoe UI", sans-serif;
        font-weight: 700;
        font-size: 54px;
        letter-spacing: 3px;
        color: #eaf2ff;
        text-shadow: 0 0 18px rgba(53, 240, 255, 0.35);
      }
      .bb-splash-sub {
        font-family: "Courier New", monospace;
        font-size: 15px;
        letter-spacing: 2px;
        color: #8fa3d9;
      }
      /* R2 comfort: honour the OS reduced-motion setting (the game's own comfort
         toggles aren't loaded this early, so defer to the platform signal). */
      @media (prefers-reduced-motion: reduce) {
        .bb-splash-eye { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="bb-splash">
      <div class="bb-splash-eye"></div>
      <div class="bb-splash-wordmark">BOLT BUDDIES</div>
      <div class="bb-splash-sub">a 2-player rescue mission</div>
    </div>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
